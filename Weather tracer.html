<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
</head>
<style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e2a78, #2f3fa6);
    display: flex;
    justify-content: center;
    padding: 40px 0;
    color: white;
}

.container {
    width: 800px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.card-container {
    display: flex;
    gap: 20px;
}

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    flex: 1;
}

input {
    width: 70%;
    padding: 8px;
    margin-right: 5px;
}

button {
    padding: 8px 12px;
    background: #ff7a2f;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

#history span {
    background: #ff7a2f;
    color: white;
    padding: 5px 10px;
    margin: 5px;
    display: inline-block;
    border-radius: 15px;
    cursor: pointer;
}

.console-box {
    margin-top: 20px;
    background: #0f1a5a;
    padding: 15px;
    border-radius: 8px;
}

#consoleLogs {
    background: white;
    color: black;
    padding: 10px;
    border-radius: 5px;
    height: 100px;
    overflow-y: auto;
    font-size: 13px;
}
</style>
<body>
<div class="container">
        <h1>🌤 Async Weather Tracker</h1>

        <div class="card-container">

            <!-- Search Section -->
            <div class="card">
                <h3>Search City</h3>
                <input type="text" id="cityInput" placeholder="Enter city">
                <button id="searchBtn">Search</button>

                <h4>Search History</h4>
                <div id="history"></div>
            </div>

            <!-- Weather Info Section -->
            <div class="card">
                <h3>Weather Info</h3>
                <div id="weatherResult">search a city to see weather</div>
            </div>

        </div>

        <!-- Console Section -->
        <div class="console-box">
            <h4>Console – Event Loop</h4>
            <div id="consoleLogs"></div>
        </div>

    </div>
</body>

<script src="script.js"></script>
<script>
const apiKey = "81851bd5346df0f87ee3a635be578211";

const searchBtn = document.getElementById("searchBtn");
const cityInput = document.getElementById("cityInput");
const weatherResult = document.getElementById("weatherResult");
const historyDiv = document.getElementById("history");
const consoleLogs = document.getElementById("consoleLogs");

searchBtn.addEventListener("click", fetchWeather);

function log(message) {
    consoleLogs.innerHTML += message + "<br>";
    consoleLogs.scrollTop = consoleLogs.scrollHeight;
}

async function fetchWeather() {
    log("1️⃣ Function Start");

    const city = cityInput.value.trim();

    if (!city) {
        log("❌ No city entered");
        return;
    }

    try {
        log("2️⃣ Before Fetch");

        const response = await fetch (
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
        );

        log("3️⃣ After Fetch (Promise Resolved)");

        if (!response.ok) {
            throw new Error("City not found");
        }

        const data = await response.json();
        log("4️⃣ After JSON Parse");

        displayWeather(data);
        saveToLocalStorage(city);

    } catch (error) {
        weatherResult.innerHTML = "City not found";
        log("❌ Error Caught");
    }

    log("5️⃣ Function End");
}

function displayWeather(data) {
    weatherResult.innerHTML = `
        <p><b>City:</b> ${data.name}</p>
        <p><b>Temp:</b> ${data.main.temp} °C</p>
        <p><b>Weather:</b> ${data.weather[0].description}</p>
        <p><b>Humidity:</b> ${data.main.humidity}%</p>
        <p><b>Wind:</b> ${data.wind.speed} m/s</p>
    `;
}

function saveToLocalStorage(city) {
    let cities = JSON.parse(localStorage.getItem("cities")) || [];

    if (!cities.includes(city)) {
        cities.push(city);
        localStorage.setItem("cities", JSON.stringify(cities));
    }

    displayHistory();
}

function displayHistory() {
    historyDiv.innerHTML = "";
    let cities = JSON.parse(localStorage.getItem("cities")) || [];

    cities.forEach(city => {
        const span = document.createElement("span");
        span.textContent = city;

        span.addEventListener("click", () => {
            cityInput.value = city;
            fetchWeather();
        });

        historyDiv.appendChild(span);
    });
}

displayHistory();
</script>
</html>
